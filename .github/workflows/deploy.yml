# Workflow for publishing plugin to WordPress repository
name: Deploy plugin to WordPress.org
on:
  push:
    tags:
      - '*'

jobs:
  notify_start:
    runs-on: ubuntu-latest
    steps:
      - name: Slack Notify Start
        uses: slackapi/slack-github-action@v3
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "C07HH3EP199",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "WordPress release - build starting - ${{ github.ref_name }}"
                  }
                }
              ]
            }

  build:
    name: Build and deploy
    needs: notify_start
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer, cs2pr

      - name: WordPress Plugin Deploy
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          ASSETS_DIR: 'assets'
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SLUG: casa-courses
          VERSION: ${{ github.ref_name }}

  notify_end:
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: Slack Notify End
        uses: slackapi/slack-github-action@v3
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "C07HH3EP199",
              "attachments": [
                {
                  "color": "${{ needs.build.result == 'success' && 'good' || 'danger' }}",
                  "title": "WordPress deployment results (${{ github.ref_name }}) - ${{ needs.build.result }}",
                  "fields": [
                    {
                      "value": "Deploy results (${{ github.ref_name }})\nGitHub Action build result: ${{ needs.build.result }}",
                      "short": false
                    }
                  ]
                }
              ]
            }
